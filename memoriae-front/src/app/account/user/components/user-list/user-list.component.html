<h2>Liste des utilisateurs</h2>

<button (click)="onCreate()">Créer un utilisateur</button>

<ul>
  @for (user of users; track user.id) {
    <li>
      {{ user.pseudo }} - {{ user.email }}
      <button (click)="onEdit(user.id)">Modifier</button>
      <button (click)="onDelete(user.id)">Supprimer</button>
    </li>
  }
</ul>
