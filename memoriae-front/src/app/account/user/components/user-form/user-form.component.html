<h2>{{ isEditMode ? 'Modifier' : 'Créer' }} un utilisateur</h2>

<div>
  <label>Pseudo</label>
  <input type="text" [(ngModel)]="dto.pseudo" />
</div>

<div>
  <label>Email</label>
  <input type="email" [(ngModel)]="dto.email" />
</div>

@if (!isEditMode) {
  <div>
    <label>Mot de passe</label>
    <input type="password" [(ngModel)]="dto.password" />
  </div>
}

<button (click)="submit()">
  {{ isEditMode ? 'Modifier' : 'Créer' }}
</button>

<button (click)="router.navigate(['/users'])">
  Annuler
</button>
