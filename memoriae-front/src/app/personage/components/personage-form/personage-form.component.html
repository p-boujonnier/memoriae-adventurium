<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <h2>{{ isEditMode ? 'Modifier' : 'Créer' }} un personnage</h2>
  </div>
  <div class="bg-parchment rounded border border-gold-dark shadow-lg p-8">

    <!-- === FIELDS === -->
    <!-- Prénom -->
    <div class="mb-5">
      <label class="block text-stone-dark font-medieval uppercase tracking-wide text-sm mb-2">
        Prénom
      </label>
      <input type="text"
             [ngModel]="isEditMode ? updateDTO.firstName : createDTO.firstName"
             (ngModelChange)="isEditMode ? updateDTO.firstName = $event : createDTO.firstName = $event"
             class="w-full bg-parchment border-b-2 border-gold-dark focus:border-gold outline-none px-2 py-2 text-stone-dark font-medieval transition-colors" />
    </div>

    <!-- Nom de famille -->
    <div class="mb-8">
      <label class="block text-stone-dark font-medieval uppercase tracking-wide text-sm mb-2">
        Nom
      </label>
      <input type="text"
             [ngModel]="isEditMode ? updateDTO.lastName : createDTO.lastName"
             (ngModelChange)="isEditMode ? updateDTO.lastName = $event : createDTO.lastName = $event"
             class="w-full bg-parchment border-b-2 border-gold-dark focus:border-gold outline-none px-2 py-2 text-stone-dark font-medieval transition-colors" />
    </div>

    <!-- === BUTTONS === -->
    <div class="flex gap-4 mt-8 flex-wrap justify-center">
      <!-- Valid -->
      <app-button variant="forest" (click)="submit()">
        {{ isEditMode ? 'Modifier' : 'Créer' }}
      </app-button>

      <!-- Cancel -->
      <app-button variant="blood" (click)="cancel()">
        + Annuler +
      </app-button>
    </div>
  </div>
</div>
